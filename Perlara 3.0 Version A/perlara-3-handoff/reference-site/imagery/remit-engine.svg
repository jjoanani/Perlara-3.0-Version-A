<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280"
     role="img" aria-labelledby="remit-title remit-desc">
  <title id="remit-title">REMIT engine — four-stage drug discovery pipeline</title>
  <desc id="remit-desc">Four numbered nodes connected by arrows: Model, Screen, Validate, Translate. Each node has an icon: a yeast cell, a screening grid, a patient cell with arrow, and a clinical-trial flag. Cream and teal palette with coral accents.</desc>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A1614"/>
    </marker>
  </defs>

  <rect width="920" height="280" rx="12" fill="#FBF8F2"/>

  <!-- main connector line -->
  <line x1="100" y1="140" x2="820" y2="140"
        stroke="#1A1614" stroke-width="2"
        stroke-dasharray="6 6" marker-end="url(#arrow2)"/>

  <!-- ============== Stage 01 — Model ============== -->
  <g transform="translate(120, 140)">
    <circle r="56" fill="#FBF8F2" stroke="#0B6B5C" stroke-width="3"/>
    <!-- yeast budding mini-icon -->
    <ellipse cx="-6" cy="2" rx="20" ry="20" fill="#FBF8F2" stroke="#1A1614" stroke-width="2"/>
    <ellipse cx="18" cy="-18" rx="10" ry="10" fill="#0B6B5C" stroke="#1A1614" stroke-width="2"/>
    <circle cx="-9" cy="2" r="4" fill="#D9603F"/>
    <text x="0" y="92" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="12" fill="#0B6B5C" font-weight="700">01 · MODEL</text>
    <text x="0" y="112" text-anchor="middle" font-family="Fraunces, Georgia, serif"
          font-size="15" fill="#1A1614">Humanized yeast avatar</text>
  </g>

  <!-- ============== Stage 02 — Screen ============== -->
  <g transform="translate(360, 140)">
    <circle r="56" fill="#FBF8F2" stroke="#0B6B5C" stroke-width="3"/>
    <!-- screening grid icon -->
    <g transform="translate(-22, -22)">
      <rect width="44" height="44" fill="none" stroke="#1A1614" stroke-width="2"/>
      <line x1="11" y1="0" x2="11" y2="44" stroke="#1A1614" stroke-width="1.5"/>
      <line x1="22" y1="0" x2="22" y2="44" stroke="#1A1614" stroke-width="1.5"/>
      <line x1="33" y1="0" x2="33" y2="44" stroke="#1A1614" stroke-width="1.5"/>
      <line x1="0" y1="11" x2="44" y2="11" stroke="#1A1614" stroke-width="1.5"/>
      <line x1="0" y1="22" x2="44" y2="22" stroke="#1A1614" stroke-width="1.5"/>
      <line x1="0" y1="33" x2="44" y2="33" stroke="#1A1614" stroke-width="1.5"/>
      <!-- a few hits in the grid -->
      <rect x="1" y="1" width="10" height="10" fill="#0B6B5C"/>
      <rect x="23" y="12" width="10" height="10" fill="#0B6B5C"/>
      <rect x="34" y="34" width="9" height="9" fill="#D9603F"/>
      <rect x="12" y="34" width="10" height="9" fill="#0B6B5C"/>
    </g>
    <text x="0" y="92" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="12" fill="#0B6B5C" font-weight="700">02 · SCREEN</text>
    <text x="0" y="112" text-anchor="middle" font-family="Fraunces, Georgia, serif"
          font-size="15" fill="#1A1614">8,384 compound library</text>
  </g>

  <!-- ============== Stage 03 — Validate ============== -->
  <g transform="translate(600, 140)">
    <circle r="56" fill="#FBF8F2" stroke="#0B6B5C" stroke-width="3"/>
    <!-- patient cell + check -->
    <path d="M -22 0
             C -22 -22 -8 -28 6 -22
             C 22 -16 22 8 8 22
             C -8 28 -22 22 -22 0 z"
          fill="#FBF8F2" stroke="#1A1614" stroke-width="2"/>
    <circle cx="-4" cy="-4" r="6" fill="#0B6B5C"/>
    <!-- coral checkmark -->
    <path d="M 14 -8 L 22 -16 L 30 -22"
          fill="none" stroke="#D9603F" stroke-width="3" stroke-linecap="round"/>
    <path d="M 14 -8 L 18 -2 L 30 -22"
          fill="none" stroke="#D9603F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="92" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="12" fill="#0B6B5C" font-weight="700">03 · VALIDATE</text>
    <text x="0" y="112" text-anchor="middle" font-family="Fraunces, Georgia, serif"
          font-size="15" fill="#1A1614">Patient fibroblasts &amp; iPSCs</text>
  </g>

  <!-- ============== Stage 04 — Translate ============== -->
  <g transform="translate(820, 140)">
    <circle r="56" fill="#FBF8F2" stroke="#D9603F" stroke-width="3"/>
    <!-- flag / trial icon -->
    <line x1="-14" y1="-22" x2="-14" y2="24" stroke="#1A1614" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M -14 -22 L 22 -22 L 14 -10 L 22 2 L -14 2 z"
          fill="#D9603F" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="92" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="12" fill="#D9603F" font-weight="700">04 · TRANSLATE</text>
    <text x="0" y="112" text-anchor="middle" font-family="Fraunces, Georgia, serif"
          font-size="15" fill="#1A1614">N-of-1 → Phase III</text>
  </g>

  <!-- title -->
  <text x="460" y="40" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-size="22"
        font-weight="500" fill="#1A1614">REMIT engine</text>
  <text x="460" y="62" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="12" fill="#4A4641">
    Repurposing with Engineered Models of IMD Targets
  </text>
</svg>
