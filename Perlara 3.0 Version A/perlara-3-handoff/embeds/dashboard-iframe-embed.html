<!--
  Perlara public dashboard embed
  ==============================
  Paste this snippet into a Webflow Embed element on the /data-portal page.
  - The embed reaches the existing dashboard at perlara.com/perlara-public-dashboard.
  - Default heights: 1100px desktop, 780px mobile (matched to the dashboard layout).
  - Optional: include iframe-resizer for auto-height (uncomment script tag).
-->
<style>
  .perlara-iframe-host {
    border: 1px solid var(--line, #E7E1D5);
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 12px 30px -22px rgba(26, 22, 20, 0.25);
  }
  .perlara-iframe-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line, #E7E1D5);
    background: #FFFCF5;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 13px;
    color: #3F3935;
  }
  .perlara-iframe-toolbar .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #D9603F;
  }
  .perlara-iframe-host iframe {
    width: 100%;
    height: 1100px;
    border: 0;
    display: block;
  }
  @media (max-width: 720px) {
    .perlara-iframe-host iframe { height: 780px; }
  }
</style>

<div class="perlara-iframe-host" role="region" aria-label="Perlara public dashboard">
  <div class="perlara-iframe-toolbar">
    <span class="dot" aria-hidden="true"></span>
    <strong>perlara.com/perlara-public-dashboard</strong>
    <span style="margin-left:auto;">
      <a href="https://www.perlara.com/perlara-public-dashboard"
         target="_blank" rel="noopener">Open in new tab ↗</a>
    </span>
  </div>
  <iframe
    src="https://www.perlara.com/perlara-public-dashboard"
    title="Perlara public dashboard"
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
    allow="fullscreen"></iframe>
</div>

<!--
  Optional auto-resize (recommended once iframe-resizer is hosted on the
  dashboard side). Uncomment after coordinating with the dashboard host:

  <script src="https://cdn.jsdelivr.net/npm/@iframe-resizer/parent@5/index.umd.js"></script>
  <script>iframeResize({ license: 'GPLv3', waitForLoad: true }, '.perlara-iframe-host iframe');</script>
-->
