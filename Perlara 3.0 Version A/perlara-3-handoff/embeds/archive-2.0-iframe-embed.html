<!--
  Perlara 2.0 archive embed
  =========================
  Paste into Webflow Embed on /archive-2-0. Update the iframe `src`
  to the final hosted URL of the 2.0 snapshot once it is uploaded
  (e.g. https://perlara.com/2-0-archive/).
-->
<style>
  .p2-archive-host {
    border: 1px solid var(--line, #E7E1D5);
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
  }
  .p2-archive-host iframe {
    width: 100%;
    height: 900px;
    border: 0;
    display: block;
  }
  @media (max-width: 720px) {
    .p2-archive-host iframe { height: 700px; }
  }
</style>

<div class="p2-archive-host" role="region" aria-label="Perlara 2.0 retired site snapshot">
  <iframe
    src="/2-0-archive/index.html"
    title="Perlara 2.0 retired site snapshot"
    loading="lazy"></iframe>
</div>
