<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     role="img" aria-labelledby="mito-title mito-desc">
  <title id="mito-title">Mitochondrion with electron transport chain Complexes I–V</title>
  <desc id="mito-desc">A cross-section of a mitochondrion. The outer and inner membranes are drawn as concentric capsules, with five labeled complexes (CI, CII, CIII, CIV, CV) embedded in the inner membrane. Mobile carriers Q and cyt c are shown as smaller markers. The whole illustration uses cream, deep teal, and warm coral.</desc>

  <defs>
    <pattern id="cristaeFill" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 Q 5 0 10 10 T 20 10" stroke="#0B6B5C" stroke-width="1.2" fill="none" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- outer membrane -->
  <rect x="20" y="40" width="720" height="280" rx="140" fill="#FBF8F2" stroke="#1A1614" stroke-width="3"/>
  <!-- inner membrane (with cristae bumps) -->
  <path d="M 60 80
           L 700 80
           Q 720 80 720 120
           L 720 240
           Q 720 280 700 280
           L 60 280
           Q 40 280 40 240
           L 40 120
           Q 40 80 60 80 z
           M 70 100
           L 690 100
           Q 700 100 700 110
           L 700 250
           Q 700 260 690 260
           L 70 260
           Q 60 260 60 250
           L 60 110
           Q 60 100 70 100 z"
        fill="url(#cristaeFill)"
        stroke="#0B6B5C" stroke-width="2.2" fill-rule="evenodd"/>

  <!-- inner-membrane crista folds inside the matrix -->
  <path d="M 130 100 Q 150 200 130 260" stroke="#0B6B5C" stroke-width="1.6" fill="none"/>
  <path d="M 230 100 Q 250 200 230 260" stroke="#0B6B5C" stroke-width="1.6" fill="none"/>
  <path d="M 360 100 Q 380 200 360 260" stroke="#0B6B5C" stroke-width="1.6" fill="none"/>
  <path d="M 510 100 Q 530 200 510 260" stroke="#0B6B5C" stroke-width="1.6" fill="none"/>
  <path d="M 620 100 Q 600 200 620 260" stroke="#0B6B5C" stroke-width="1.6" fill="none"/>

  <!-- ETC complexes embedded in inner membrane (top edge) -->
  <!-- CI -->
  <g transform="translate(120, 80)">
    <rect x="-22" y="-14" width="44" height="32" rx="4" fill="#06453B" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="13" fill="#FBF8F2" font-weight="600">CI</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="11" fill="#4A4641">NADH-DH</text>
  </g>
  <!-- CII -->
  <g transform="translate(240, 80)">
    <rect x="-22" y="-14" width="44" height="32" rx="4" fill="#06453B" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="13" fill="#FBF8F2" font-weight="600">CII</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="11" fill="#4A4641">SDH</text>
  </g>
  <!-- Q (mobile carrier) -->
  <g transform="translate(305, 80)">
    <circle cx="0" cy="2" r="9" fill="#D9603F" stroke="#1A1614" stroke-width="1.8"/>
    <text x="0" y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="11" fill="#FBF8F2" font-weight="700">Q</text>
  </g>
  <!-- CIII -->
  <g transform="translate(380, 80)">
    <rect x="-22" y="-14" width="44" height="32" rx="4" fill="#06453B" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="13" fill="#FBF8F2" font-weight="600">CIII</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="11" fill="#4A4641">cyt bc1</text>
  </g>
  <!-- cyt c -->
  <g transform="translate(450, 80)">
    <circle cx="0" cy="2" r="8" fill="#D9603F" stroke="#1A1614" stroke-width="1.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="9" fill="#FBF8F2" font-weight="700">cyt c</text>
  </g>
  <!-- CIV -->
  <g transform="translate(525, 80)">
    <rect x="-22" y="-14" width="44" height="32" rx="4" fill="#06453B" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="13" fill="#FBF8F2" font-weight="600">CIV</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="11" fill="#4A4641">SURF1, COX</text>
  </g>
  <!-- CV (ATP synthase) -->
  <g transform="translate(640, 80)">
    <!-- F1 head sphere -->
    <circle cx="0" cy="-26" r="14" fill="#D9603F" stroke="#1A1614" stroke-width="2"/>
    <!-- stalk -->
    <line x1="0" y1="-12" x2="0" y2="-2" stroke="#1A1614" stroke-width="2"/>
    <!-- F0 ring -->
    <rect x="-22" y="-2" width="44" height="22" rx="4" fill="#06453B" stroke="#1A1614" stroke-width="2"/>
    <text x="0" y="14" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="13" fill="#FBF8F2" font-weight="600">CV</text>
    <text x="0" y="-50" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="11" fill="#4A4641">ATP synthase</text>
  </g>

  <!-- title strip at bottom -->
  <text x="380" y="346" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="14" fill="#4A4641">
    Mitochondrial electron transport chain · 5 complexes, 80+ subunits
  </text>
</svg>
